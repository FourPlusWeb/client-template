name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@fourplusweb"

      # Exchange GitHub App private key for a short-lived installation token.
      # Scoped to packages:read on studio-packages + client-template;
      # rotates on every workflow run (~1h lifetime).
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.PACKAGES_APP_ID }}
          private-key: ${{ secrets.PACKAGES_APP_PRIVATE_KEY }}
          owner: FourPlusWeb

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}
